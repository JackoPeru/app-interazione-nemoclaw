<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hermes Voice Particles</title>
  <style>
    html, body { width:100%; height:100%; margin:0; overflow:hidden; background:#000; }
    canvas { display:block; width:100%; height:100%; background:#000; }
  </style>
</head>
<body>
<canvas id="scene"></canvas>
<script>
(() => {
  const canvas = document.getElementById("scene");
  const ctx = canvas.getContext("2d", { alpha: false });
  const count = 900;
  const particles = [];
  let width = 1;
  let height = 1;
  let dpr = 1;
  let time = 0;
  let last = performance.now();
  let target = 0;
  let assembly = 0;

  function rand(min, max) { return min + Math.random() * (max - min); }

  function makeParticle() {
    const u = Math.random();
    const v = Math.random();
    const theta = Math.PI * 2 * u;
    const phi = Math.acos(2 * v - 1);
    const radius = rand(0.9, 1.08);
    return {
      ix: rand(-3.2, 3.2),
      iy: rand(-2.2, 2.2),
      iz: rand(-2.8, 2.8),
      sx: radius * Math.sin(phi) * Math.cos(theta),
      sy: radius * Math.cos(phi),
      sz: radius * Math.sin(phi) * Math.sin(theta),
      phase: rand(0, Math.PI * 2),
      speed: rand(0.45, 1.65),
      size: rand(1.7, 4.2),
      hot: Math.random() > 0.74
    };
  }

  for (let i = 0; i < count; i++) particles.push(makeParticle());

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = Math.max(1, window.innerWidth);
    height = Math.max(1, window.innerHeight);
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  window.addEventListener("resize", resize);
  resize();

  window.setHermesSpeaking = value => { target = value ? 1 : 0; };
  document.body.addEventListener("click", () => { target = target > 0.5 ? 0 : 1; });

  function ease(t) { return t * t * (3 - 2 * t); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  function draw(now) {
    requestAnimationFrame(draw);
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    time += dt;
    assembly += (target - assembly) * Math.min(1, dt * (target ? 5.5 : 3.0));
    const e = ease(assembly);
    const pulse = 1 + Math.sin(time * 7.0) * 0.08 * e;
    const scale = Math.min(width, height) * (0.34 + e * 0.05) * pulse;
    const camera = 3.4;
    const spin = time * (0.08 + e * 0.48);

    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "rgb(0,0,0)";
    ctx.fillRect(0, 0, width, height);
    ctx.globalCompositeOperation = "lighter";

    for (const p of particles) {
      const wx = Math.sin(time * p.speed + p.phase) * 0.14;
      const wy = Math.cos(time * p.speed * 0.72 + p.phase) * 0.11;
      const wz = Math.sin(time * p.speed * 0.43 + p.phase) * 0.18;
      const x0 = p.ix + wx;
      const y0 = p.iy + wy;
      const z0 = p.iz + wz;
      const x = lerp(x0, p.sx, e);
      const y = lerp(y0, p.sy, e);
      const z = lerp(z0, p.sz, e);
      const cos = Math.cos(spin);
      const sin = Math.sin(spin);
      const rx = x * cos - z * sin;
      const rz = x * sin + z * cos;
      const perspective = camera / (camera + rz);
      const px = width * 0.5 + rx * scale * perspective;
      const py = height * 0.47 + y * scale * perspective;
      const dot = Math.max(1.8, p.size * (0.7 + perspective * 0.55 + e * 0.55));
      const alpha = Math.max(0.38, Math.min(1, 0.48 + perspective * 0.2 + e * 0.36));
      const glow = dot * (3.7 + e * 2.2);
      const gradient = ctx.createRadialGradient(px, py, 0, px, py, glow);
      const core = p.hot ? "255,214,94" : "255,126,24";
      gradient.addColorStop(0, `rgba(${core},${alpha})`);
      gradient.addColorStop(0.3, `rgba(255,94,12,${alpha * 0.48})`);
      gradient.addColorStop(1, "rgba(255,74,0,0)");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(px, py, glow, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = p.hot ? `rgba(255,236,142,${alpha})` : `rgba(255,152,38,${alpha})`;
      ctx.beginPath();
      ctx.arc(px, py, dot, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
